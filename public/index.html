<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- CSP 头 (为支持 Cropper.js 放宽了对 cdnjs 的限制，并允许 blob 协议预览本地图片) -->
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdnjs.cloudflare.com; 
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; 
    font-src 'self' https://fonts.gstatic.com; 
    img-src 'self' data: blob: https://cdn.jsdelivr.net https://www.google.com https://*.steamstatic.com https://*.akamaihd.net https://raw.githubusercontent.com https://github.com https://avatars.githubusercontent.com; 
    connect-src 'self' https://upload.qiniup.com https://*.qiniup.com https://up-as0.qiniup.com https://moyermusic.cn;
    worker-src 'self' blob:; 
    ">

    <title>魔师帝的个人空间</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Cropper.js 本地化引用 -->
    <link rel="stylesheet" href="/lib/cropper.min.css" />
    <script src="/lib/cropper.min.js"></script>

    <!-- 本地化依赖库 -->
    <script src="/lib/tailwind.js"></script>
    <script src="/lib/react.js"></script>
    <script src="/lib/react-dom.js"></script>    
    <script src="/lib/framer-motion.js"></script>
    <script src="./lib/math.js"></script>
    
    <style>
        /* --- 核心修改开始：地址栏锁定方案 --- */
        html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* 禁止 html 滚动 */
        }
        
        body { 
            height: 100%;
            width: 100%;
            background-color: #f8fafc; 
            overflow: hidden; /* 禁止 body 滚动，这能防止地址栏收起 */
            position: fixed; /* 强制固定，这是安卓Chrome的杀手锏 */
            left: 0;
            top: 0;
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.5s ease; 
            user-select: none; 
        }

        #root {
            height: 100%;
            width: 100%;
            overflow-y: auto; /* 滚动条转移到这里 */
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* iOS 惯性滚动 */
            position: relative;
            overscroll-behavior: none; /* 锁定系统下拉刷新手势，避免与内部滚动冲突 */
        }
        /* --- 核心修改结束 --- */

        .dark body { background-color: #0f172a; }
        
        /* 滚动条样式优化，针对 #root */
        #root::-webkit-scrollbar { width: 8px; height: 8px; }
        #root::-webkit-scrollbar-track { background: transparent; }
        #root::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 4px; }
        #root::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.8); }

        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.55); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.85); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        .game-card-mask { transform: translateZ(0); -webkit-transform: translateZ(0); backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 1rem; overflow: hidden; }
        .bg-manager-layer { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 3px; }
        
        @media (min-width: 768px) { .bg-manager-layer { display: block; } }
        input, textarea { user-select: text; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased text-slate-800 dark:text-slate-200 transition-colors duration-500">
    <div id="root"></div>

    <!-- 引用主应用脚本 -->
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('SW 注册成功:', registration.scope))
                    .catch(err => console.log('SW 注册失败:', err));
            });
        }
    </script>
</body>
</html>
